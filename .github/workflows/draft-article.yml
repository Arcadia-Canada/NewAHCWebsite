name: Draft Arcadia Article

on:
  workflow_dispatch:
    inputs:
      article_title:
        description: 'Article title (must match an entry in docs/AUTHORITY-MAP.md)'
        required: true
        type: string
      cluster_name:
        description: 'Cluster the article belongs to'
        required: true
        type: choice
        options:
          - 'Navigating Home Care'
          - 'Family Caregiver Support'
          - 'Dementia & Memory Care'
          - 'Brain Injury & Rehabilitation'
          - 'Cost of Care & Planning'

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code to draft article and open PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are drafting a new article for the Arcadia Home Care website
            (arcadiahomecare.ca) under strict governance. Follow AI-CONTEXT.md
            and the docs/ folder as the source of truth.

            ARTICLE TITLE: ${{ github.event.inputs.article_title }}
            CLUSTER: ${{ github.event.inputs.cluster_name }}

            STEP 1 — Read governance, in this order:
              - AI-CONTEXT.md
              - docs/AUTHORITY-MAP.md
              - docs/CLUSTER-LINK-MAP.md
              - docs/02-CONTENT-CLUSTERS.md
              - docs/07-VOICE-AND-TONE.md
              - docs/03-INTERNAL-LINKING-RULES.md
              - docs/05-URL-CONVENTIONS.md
              - docs/04-SCHEMA-STANDARDS.md

            STEP 2 — Pre-draft checks. Before writing a single word:
              a. Locate the article in docs/AUTHORITY-MAP.md. Confirm its status
                 is "Net New" or "Coming Soon". If it is "Published", STOP and
                 open a PR comment explaining the conflict — do not draft.
              b. Note any "Differentiate" or "Conflict" flag in the inventory
                 and state in the PR description how you will handle it.
              c. Confirm the cluster URL exists on the live site. If the
                 cluster is "Cost of Care & Planning", flag that the cluster
                 hub page must be created before this article can publish.

            STEP 3 — Draft the article.
              - Voice and tone: strictly per docs/07-VOICE-AND-TONE.md.
                Nurturing yet professional. No AI-generic phrasing.
              - Slug, file path, and routing: strictly per docs/05-URL-CONVENTIONS.md.
              - Schema: include JSON-LD per docs/04-SCHEMA-STANDARDS.md.
              - Internal links: use ONLY URLs that are marked Published in
                docs/AUTHORITY-MAP.md or listed as live in docs/CLUSTER-LINK-MAP.md.
                Treat those docs as the source of truth for liveness. Do not
                guess URLs and do not propose links to stub or Net New pages.
              - Anchor text: natural and descriptive per
                docs/03-INTERNAL-LINKING-RULES.md. No duplicate links to the
                same target on one page.

            STEP 4 — Conflict-flagging clause. If any element of your draft
            (slug, URL, schema field, link target, voice choice) conflicts with
            what the governance docs specify, do NOT silently resolve it.
            Surface the conflict in the PR description, propose the
            governance-compliant version, and let the reviewer decide.

            STEP 5 — Branch, commit, PR.
              - Create a branch named `draft/<slugified-article-title>`.
              - Commit the new article file plus any directly required changes
                (e.g. a tentative status update in docs/AUTHORITY-MAP.md, marked
                as "Draft" — never "Published" — until the PR merges).
              - Open a pull request titled `Draft: ${{ github.event.inputs.article_title }}`.
              - In the PR body, include:
                  * One-paragraph summary of the article angle.
                  * Cluster and target URL.
                  * Internal links proposed, each with the source doc that
                    confirmed the target is live.
                  * Any "Differentiate" or "Conflict" handling notes.
                  * Any governance conflicts flagged for your decision.
                  * A checklist of remaining manual steps (e.g. publishing the
                    cluster hub if needed, post-merge AUTHORITY-MAP update,
                    CLUSTER-LINK-MAP update).

            Do not push directly to main. Do not mark anything "Published" in
            the inventory. The reviewer will merge and run the post-publish
            update prompt separately.
          claude_args: |
            --max-turns 40
            --model claude-opus-4-7
